<!DOCTYPE html>
<html>

<head>
  <title id="pageTitle">article - wikabedia</title>
  <link rel="apple-touch-icon" sizes="256x256" href="img/wikabedia.ico">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="shortcut icon" href="img/wikabedia%20icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/creator.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="a wikabedia artical">
</head>

<body>
  <div class="logoDiv" onclick="site('../')">
    <img src="img/back.png">
  </div>
  <h1 class="logoText">wikabedia</h1>
  <br>
  <div class="article">
    <div class="articleImage">
      <img src="img/wat-da-dog.jpg" id="articleImg">
    </div>
    <form id="articleForm" onsubmit="return false;">
      <input class="articleTitle" id="articleTitle" type="text" required title="Article title goes here" placeholder="Write a title..."></input>
      <div class="textTools">
        <button id="insertLink" class="link" type="button" title="Insert link"><img src="img/link.png"></button>
      </div>
      <textarea class="articleText" id="articleText" type="text" required spellcheck="true" title="Article text goes here" placeholder="Write something amazing, illegal, stupid . . ."></textarea>
      <div class="articleExtra">
        <input id="articleWriter" type="name" required title="Your name goes here" placeholder="Your name..."></input>
        <input id="articleEmail" type="email" required title="Your Email goes here" placeholder="Your Email..."></input>
      </div>
      <button class="articleSubmit">Submit</button>
      <p class="disclaimer">by posting an article on wikabedia, you agree to the ButterDogCo <a href="https://b-dog.co/tos" target="_blank">TOS</a> and <a href="https://b-dog.co/pp" target="_blank">PP</a> (haha pp)</p>
    </form>
  </div>
  <footer>
    <a class="not-a-button">copyirigt wikabedia 2025</a>
    <a href="#" onclick="theme()" id="themeToggle">dark moed</a>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/creator.js"></script>
  <script src="js/theme.js"></script>
</body>

</html>
