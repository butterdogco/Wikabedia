<body>

  <script src="js/main.js"></script>
  <script src="js/articlesDir.js"></script>
  <script src="js/home.js"></script>
  <script src="js/recomend.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/backgroundImage.js"></script>
  <script src="js/autocomplete.js"></script>
  <script>
    function createDefaults() {
      if (done === false) {
        setTimeout(createDefaults, 100);
      } else {
        try {
          for (var item of data) {
            if (item.title && item.desc && item.image && item.link && item.place) {
              load(item.title, item.desc, item.image, item.link, item.place);
            }
          }

          const parent = document.getElementById("items");
          const arr = Array.from(parent.childNodes);
          arr.reverse();
          parent.append(...arr);

          const e = data[3];
          const f = data[13];
          const g = data[9];
          load(e.title, e.desc, e.image, e.link, "top");
          load(f.title, f.desc, f.image, f.link, "top");
          load(g.title, g.desc, g.image, g.link, "top");
        }
        catch (err) {
          console.error(err);
        }
      }
    }

    function checkLoad() {
      if (done === true) {
        document.getElementById('loadDiv').style.opacity = 0;
        document.getElementById('loadDiv').remove();
        
      } else {
        setTimeout(checkLoad, 150);
      }
    }

    setTimeout(createDefaults, 100);
    setTimeout(checkLoad, 150);
  </script>
</body>

</html>
