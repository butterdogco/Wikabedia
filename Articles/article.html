<html>

<head>

  <link rel="stylesheet" href="../css/article.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">

</head>

<body>
  <div class="logoDiv" onclick="site('../')">
    <img src="../img/back.png">
  </div>

  <br>
  <div class="article">
    <div class="articleImage">
      <img src="../img/wikabedia.png" id="articleImg">
    </div>
    <h1 class="articleTitle" id="articleTitle">loading</h1>
    <pre class="articleText" id="articleText">if you see this text your internet is a hot pile of garbage (or this article literally doesn't exist)</pre>
    <p class="articleWriter" id="articleWriter">article by your mother</p>
    <p class="articleWriter" id="articleDate">created 09/49/1948</p>
  </div>
  <hr>
  <h2 class="recomend"
    onclick="load('no don click me','why did you click that','../img/wikabedia.png','#','recomend');">recomend articles
  </h2>
  <div class="items" id="recomend"></div>
  <div class="loading" id="loadDiv">
    <img src="../img/wikabedia.png" class="loading-icon">
    <div class="loading-spinner"></div>
  </div>

  <footer>
    <a class="not-a-button">copyirigt wikabedia 2025</a>
    <a href="https://forms.gle/b74LRxjEW1LjT2aP8">maek an article 4 FRE!</a>
    <a href="#" onclick="theme()" id="themeToggle">dark moed</a>
  </footer>

  <script src="../js/main.js"></script>
  <script src="../js/articlesDir.js"></script>
  <script src="../js/article.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/autocomplete.js"></script>
  <script>
    var url = new URL(window.location);
    var articleNum = url.searchParams.get("article");  
    
    function processTags(text) {
      var first = text.replaceAll("<", "&lt");
      var second = first.replaceAll(">", "&gt");
      return second;
    }
    
    function processURLs(text) {
      var regex = /\((.*?)\)\[(.*?)\]/g;;
      var final = text.replace(regex, function(match, linkText, url) {
        var link = url.trim();
        var articleRegex = /Article\/\d+$/;
        if (link.toString().match(articleRegex)) {
          var id = link.split("/")[1];
          link = `../Articles/article.html?article=${id}`;
        }
        return `<a href="${link}" title="${url.trim()}">${linkText.trim()}</a>`;
      });
      return final;
    }
    
    function processText(text) {
      var first = processTags(text);
      var second = processURLs(first);
      return second;
    }

    const columns = [
      "A", // date
      "B", // email
      "C", // name
      "D", // title
      "E", // desc
      "F", // image
      "G", // articleTitle
      "H", // mainText
      "I", // appropriate or not
    ]
    
    async function sheetData(column, id, mode) {
      try {
        const data = await getSheetData();
        let val = data ? data[articleNum - 1][columns.indexOf(column)] : undefined;

        if (mode === "image") {
          try {
          const linkPattern = /^https:\/\/drive\.google\.com\/open\?id=.*/;
          if (linkPattern.test(val)) {
            const imageId = val.replace('https://drive.google.com/open?id=', '');
            const newImageUrl = `https://drive.google.com/thumbnail?id=${imageId}`;
            document.getElementById(id).src = newImageUrl;
          } else {
            document.getElementById(id).src = val;
          }
          } catch (err) {
          console.error(err);
          }
        } else if (mode === "title") {
          document.getElementById(id).innerHTML = val === undefined ? "tis article no exist i tink" : val;
        } else if (mode === "text") {
          document.getElementById(id).innerHTML = val === undefined ? "i forgor the text" : processText(`${val}`);
        } else if (mode === "writer") {
          document.getElementById(id).innerHTML = val === undefined ? "article by your mother" : `article by ${val}`;
        } else if (mode === "pageTitle") {
          document.title = val === undefined ? "nothing - wikabedia" : `${val} - wikabedia`;
        } else if (mode === "dateMade") {
          document.getElementById(id).innerHTML = val === undefined ? 'created tomorrow' : `created ${val}`;
        }

        return val;
      } catch (error) {
        document.getElementById('articleTitle').innerHTML = "error loading article";
        console.error(error);
      }
    }

    const approved = sheetData("I", "", "approved");
    if (approved === "no") {
      window.location.href = "../Articles/article.html?article=1";
      alert("this article has been removed by a moderator");
    } else {
      sheetData("G", "articleTitle", "title");
      sheetData("H", "articleText", "text");
      sheetData("F", "articleImg", "image");
      sheetData("C", "articleWriter", "writer");
      sheetData("G", "", "pageTitle");
      sheetData("A", "articleDate", "dateMade");
    }

    function checkLoad() {
      if (document.getElementById('articleTitle').innerHTML != "loading" == false) {
        window.setTimeout(checkLoad, 100);
      } else {
        document.getElementById('loadDiv').style.opacity = 0;
        window.setTimeout(function () {
          document.getElementById('loadDiv').remove();
        }, 200);
      }
    }
    checkLoad();
  </script>
  <script src="../js/recomend.js"></script>
</body>

</html>
